# ============================================================
#  Graywell Server Watchdog v2 - Configuration
#  Location: /etc/graywell-watchdog.conf
# ============================================================

# ALERT EMAIL
# Where to send critical alerts
ALERT_EMAIL="security@graywelldesign.com"

# LOGGING
# Main watchdog log (JSON structured) - rotates at 10MB
LOG="/var/log/graywell-watchdog-enhanced.log"
# Diagnostic findings log - rotates at 10MB
DIAGNOSTIC_LOG="/var/log/graywell-watchdog-diagnostic.log"
# State files directory
STATE_DIR="/var/run/graywell-watchdog"

# THRESHOLDS
# Disk space warning/critical levels (%)
DISK_WARN=85
DISK_CRIT=95

# Memory available warning/critical levels (MB)
MEM_WARN_MB=150
MEM_CRIT_MB=75

# HTTP check timeout (seconds)
HTTP_TIMEOUT=10
CHECK_URL="http://localhost"

# RESTART LOOP PROTECTION
# Maximum restarts allowed within window
MAX_RESTART_ATTEMPTS=3
# Time window for counting restarts (minutes)
RESTART_WINDOW_MINUTES=10

# AUTO-RECOVERY BOUNDS
# These prevent watchdog from making unsafe changes
# MaxRequestWorkers range (Apache)
TUNING_LIMITS_MaxRequestWorkers_min=8
TUNING_LIMITS_MaxRequestWorkers_max=32

# PHP memory_limit range
TUNING_LIMITS_php_memory_limit_min="128M"
TUNING_LIMITS_php_memory_limit_max="1G"

# MySQL max_connections range
TUNING_LIMITS_mysql_max_connections_min=100
TUNING_LIMITS_mysql_max_connections_max=1000
